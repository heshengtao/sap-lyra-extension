<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>星莱 Lyra - SAP Character Extension</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--bg:#f8f6fc;--bg2:#eeebf8;--card:#ffffffcc;--text:#2a1f4a;--sub:#887ca3;--accent:#7c3aed;--accent2:#a78bfa;--accent-glow:rgba(124,58,237,0.12);--star:#c4b5fd;--bdr:rgba(124,58,237,0.08);--r:16px;--shadow:0 2px 20px rgba(100,60,200,0.06);--t:0.3s cubic-bezier(0.22,0.1,0.22,1);--font:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif}
body.dark{--bg:#0f0b1a;--bg2:#18132a;--card:#1e1635cc;--text:#e8e0f4;--sub:#9088b4;--accent:#a78bfa;--accent2:#c4b5fd;--accent-glow:rgba(167,139,250,0.10);--star:#6e5ca0;--bdr:rgba(167,139,250,0.08);--shadow:0 2px 20px rgba(0,0,0,0.3)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);font-size:14.5px;line-height:1.6;background:var(--bg);color:var(--text);transition:background var(--t),color var(--t);overflow:hidden}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:url('backgroud.png') center/cover no-repeat;opacity:0.08;pointer-events:none}
body.dark::before{opacity:0.04}
body{display:flex;flex-direction:column}
body::after{content:'';position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse at 50% 0%,var(--accent-glow) 0%,transparent 60%);pointer-events:none}

header{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;border-bottom:1px solid var(--bdr);background:var(--bg2);z-index:10}
header .logo{font-weight:700;font-size:17px;display:flex;align-items:center;gap:8px;letter-spacing:-0.3px}
header .logo i{color:var(--accent);font-size:16px}
.header-actions{display:flex;gap:4px;align-items:center}
.header-actions button{width:32px;height:32px;border-radius:50%;background:transparent;border:1px solid var(--bdr);color:var(--sub);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;font-size:13px}
.header-actions button:hover{background:var(--accent-glow);color:var(--accent);border-color:var(--accent2)}
.header-actions button.lang-btn{width:auto;padding:0 10px;border-radius:16px;font-size:11px;font-weight:700}
.status-dot{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:14px;font-size:11px;font-weight:700}
.status-dot.ready{background:rgba(52,211,153,0.1);color:rgb(52,211,153)}
.status-dot.pending{background:var(--accent-glow);color:var(--accent)}
.status-dot .dot-inner{width:6px;height:6px;border-radius:50%;background:currentColor}

main{flex:1;overflow-y:auto;scroll-behavior:smooth}
main::-webkit-scrollbar{width:4px}
main::-webkit-scrollbar-track{background:transparent}
main::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}

.hero{position:relative;text-align:center;padding:44px 24px 28px}
.hero-glow{position:absolute;inset:0;z-index:0;background:radial-gradient(ellipse at 50% 30%,var(--accent-glow) 0%,transparent 70%)}
.hero-icon{width:88px;height:88px;border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:42px;position:relative;z-index:1;border:2px solid var(--accent2);box-shadow:0 0 40px var(--accent-glow);background:var(--bg2)}
.hero h1{font-size:26px;font-weight:800;position:relative;z-index:1;margin-bottom:2px;letter-spacing:-0.5px}
.hero .sub{font-size:13px;color:var(--sub);position:relative;z-index:1;margin-bottom:18px;letter-spacing:0.3px}

.install-area{position:relative;z-index:1;max-width:500px;margin:0 auto;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:18px 22px;box-shadow:var(--shadow);text-align:left;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.install-area.done{border-color:rgba(52,211,153,0.2);background:rgba(52,211,153,0.03)}
.install-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.install-head h3{font-size:14px;font-weight:700}
.install-btn{padding:9px 24px;border-radius:20px;background:var(--accent);border:none;color:#fff;cursor:pointer;font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:6px;transition:all 0.2s;font-family:var(--font);letter-spacing:-0.2px}
.install-btn:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 4px 16px var(--accent-glow)}
.install-btn:disabled{opacity:0.45;cursor:not-allowed;transform:none}
.install-btn.success{background:rgb(52,211,153)}
.install-btn.success:hover{background:rgb(52,211,153);transform:none;box-shadow:none}
.install-summary{font-size:12px;color:var(--sub);line-height:1.9;margin-top:4px}

.tabs{display:flex;padding:0 24px;gap:0;flex-shrink:0;border-bottom:1px solid var(--bdr)}
.tab-btn{padding:10px 18px;background:none;border:none;border-bottom:2px solid transparent;color:var(--sub);cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s;font-family:var(--font);letter-spacing:-0.2px}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

.section{padding:24px;display:none}
.section.active{display:block}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow);transition:all 0.25s;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.card:hover{border-color:var(--accent2);transform:translateY(-2px);box-shadow:0 8px 28px var(--accent-glow)}
.card .card-icon{font-size:22px;color:var(--accent);margin-bottom:10px;opacity:0.85}
.card h3{font-size:15px;margin-bottom:6px;font-weight:700;letter-spacing:-0.2px}
.card p{font-size:12.5px;color:var(--sub);line-height:1.75}
.card code{font-family:"SF Mono","Cascadia Code","Fira Code",monospace;font-size:11px;background:var(--accent-glow);padding:2px 7px;border-radius:5px;color:var(--accent)}

.chart-tab{display:flex;flex-direction:column;align-items:center;gap:16px}
.chart-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center}
.chart-controls input[type=date]{padding:7px 12px;border:1px solid var(--bdr);border-radius:8px;font-size:13px;background:var(--card);color:var(--text);font-family:var(--font)}
.chart-controls input[type=time]{padding:7px 12px;border:1px solid var(--bdr);border-radius:8px;font-size:13px;background:var(--card);color:var(--text);font-family:var(--font)}
.chart-controls button{padding:7px 16px;border-radius:8px;border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font);transition:all 0.2s}
.chart-controls button:hover{background:var(--accent2)}
.chart-canvas-wrap{background:var(--card);border-radius:var(--r);border:1px solid var(--bdr);box-shadow:var(--shadow);padding:12px}
canvas{display:block;max-width:100%}
.chart-legend{display:flex;flex-wrap:wrap;gap:10px 16px;justify-content:center;font-size:11px;color:var(--sub)}
.chart-legend span{display:inline-flex;align-items:center;gap:4px}

.steps{display:none;margin-top:12px}
.steps.show{display:block}
.step{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px}
.step i{width:16px;text-align:center;flex-shrink:0}
.step i.spin{color:var(--accent)}.step i.ok{color:rgb(52,211,153)}.step i.err{color:rgb(239,68,68)}.step i.warn{color:rgb(251,191,36)}
.step span{color:var(--sub)}
.step .what{font-weight:600;color:var(--text)}

body.compact{background:transparent!important}
html.compact{background:transparent!important}
body.compact header,body.compact footer{-webkit-app-region:drag}
body.compact button,body.compact input,body.compact .compact-close-btn{-webkit-app-region:no-drag}
.compact-close-btn{display:none}
body.compact .compact-close-btn{display:flex;position:absolute;top:5px;right:5px;width:20px;height:20px;background:rgb(255,57,57);border:none;border-radius:50%;color:#fff;align-items:center;justify-content:center;font-size:10px;cursor:pointer;z-index:100;-webkit-app-region:no-drag}
body.compact main{display:none}
body.compact header{padding:0 12px;height:44px}

@media(max-width:700px){.hero{padding:32px 16px 20px}.hero h1{font-size:22px}.cards{grid-template-columns:1fr}.section{padding:16px}.tabs{padding:0 12px}.tab-btn{padding:8px 10px;font-size:12px}}

footer{border-top:1px solid var(--bdr);padding:8px 24px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;color:var(--sub);flex-shrink:0}
footer .dot{width:5px;height:5px;border-radius:50%}
footer .dot.on{background:rgb(52,211,153);animation:pulse 2s infinite}
footer .dot.off{background:rgb(239,68,68)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

.modal-overlay{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.45);backdrop-filter:blur(6px);align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--shadow),0 24px 60px rgba(0,0,0,0.3);max-width:440px;width:90%;padding:26px;animation:modalIn 0.28s ease;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
@keyframes modalIn{from{opacity:0;transform:translateY(24px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-box h2{font-size:17px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:7px;letter-spacing:-0.3px}
.modal-box h2 i{color:var(--accent)}
.modal-box .modal-body{font-size:12.5px;line-height:1.8;color:var(--sub);margin:14px 0;white-space:pre-line}
.modal-box .modal-actions{display:flex;justify-content:flex-end;gap:8px}
.modal-box .modal-actions button{padding:8px 18px;border-radius:8px;border:1px solid var(--bdr);background:var(--bg2);color:var(--text);cursor:pointer;font-size:12.5px;font-weight:600;transition:all 0.2s;font-family:var(--font)}
.modal-box .modal-actions button:hover{border-color:var(--accent)}
.modal-box .modal-actions button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.modal-box .modal-actions button.primary:hover{background:var(--accent2)}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);z-index:1000;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--shadow),0 12px 40px rgba(0,0,0,0.18);padding:15px 22px;display:flex;align-items:center;gap:10px;max-width:400px;opacity:0;transition:all 0.35s cubic-bezier(0.22,0.1,0.22,1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast .toast-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.toast .toast-icon.ok{background:rgba(52,211,153,0.12);color:rgb(52,211,153)}
.toast .toast-icon.err{background:rgba(239,68,68,0.12);color:rgb(239,68,68)}
.toast .toast-icon.warn{background:rgba(251,191,36,0.12);color:rgb(251,191,36)}
.toast .toast-body{font-size:12.5px;line-height:1.5}
.toast .toast-body .toast-title{font-weight:700;margin-bottom:1px}
.toast .toast-body .toast-msg{color:var(--sub);font-size:11.5px}
</style>
</head>
<body>

<button class="compact-close-btn" onclick="closeWindow()"><i class="fa-solid fa-xmark"></i></button>

<header>
  <div class="logo"><i class="fa-solid fa-star"></i><span id="hdr-title">星莱 Lyra</span></div>
  <div class="header-actions">
    <span class="status-dot" id="badge"><span class="dot-inner"></span><span id="badge-text">Lyra</span></span>
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
    <button onclick="toggleTheme()" title="主题"><i class="fa-solid fa-moon" id="themeIcon"></i></button>
  </div>
</header>

<div class="tabs" id="tabBar">
  <button class="tab-btn active" data-tab="intro"><span class="tl"></span></button>
  <button class="tab-btn" data-tab="story"><span class="tl"></span></button>
  <button class="tab-btn" data-tab="chart"><span class="tl"></span></button>
  <button class="tab-btn" data-tab="tools"><span class="tl"></span></button>
</div>

<main>
  <section class="section active" id="sec-intro">
    <div class="hero">
      <div class="hero-glow"></div>
      <div class="hero-icon">✨</div>
      <h1>星莱 <span style="font-weight:400;color:var(--sub)">Lyra</span></h1>
      <p class="sub" id="hero-sub">穿梭于幻想星海与数字世界的星空魔法使</p>
      <div class="install-area" id="installArea">
        <div class="install-head">
          <h3 id="install-label">配置状态</h3>
          <button class="install-btn" id="installBtn" onclick="onInstallClick()">
            <i class="fa-solid fa-download"></i><span id="installBtnText">一键安装</span>
          </button>
        </div>
        <div class="install-summary" id="installSummary"></div>
        <div class="steps" id="stepsBox"></div>
      </div>
    </div>
  </section>
  <section class="section" id="sec-story"><div class="cards" id="storyCards"></div></section>
  <section class="section" id="sec-chart">
    <div class="chart-tab">
      <div class="chart-controls">
        <input type="date" id="chartDate" />
        <input type="time" id="chartTime" value="12:00" />
        <button onclick="drawChart()">🔮 <span id="chartBtnLabel">生成星盘</span></button>
      </div>
      <div class="chart-canvas-wrap"><canvas id="chartCanvas" width="500" height="500"></canvas></div>
      <div class="chart-legend" id="chartLegend"></div>
    </div>
  </section>
  <section class="section" id="sec-tools"><div class="cards" id="toolsCards"></div></section>
</main>

<footer>
  <div class="dot off" id="wsDot"></div>
  <span id="ft-text">未连接</span>
</footer>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <h2><i class="fa-solid fa-star"></i><span id="modalTitle"></span></h2>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions">
      <button onclick="hideModal()" id="modalCancel">取消</button>
      <button class="primary" onclick="hideModal();doInstall()" id="modalConfirm">确认安装</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <div class="toast-icon ok" id="toastIcon"><i class="fa-solid fa-circle-check"></i></div>
  <div class="toast-body">
    <div class="toast-title" id="toastTitle"></div>
    <div class="toast-msg" id="toastMsg"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   Lyra Extension — SAP Character
   ═══════════════════════════════════════════ */
var $=function(s){return document.querySelector(s)};
var $$=function(s){return document.querySelectorAll(s)};
var ws,MY_EXT_ID='',settingsCache=null;
var _closing=false,_installed=false,_installing=false,_promptShown=false;

/* ─── i18n ─── */
var L=localStorage.getItem('lyra_lang')||'zh';
var I={zh:{
  title:'星莱 Lyra',heroSub:'穿梭于幻想星海与数字世界的星空魔法使',

  var d=dateStr?new Date(dateStr+'T'+timeStr+':00'):new Date();
  if(isNaN(d.getTime()))d=new Date();
  var hour=parseInt(timeStr.split(':')[0])||12;
  var planets=computePlanets(d,hour),aspects=computeAspects(planets);
  // Clear
  ctx.clearRect(0,0,W,H);
  // Background ring
  ctx.beginPath();ctx.arc(cx,cy,R+20,0,Math.PI*2);ctx.fillStyle=isDark?'rgba(255,255,255,0.02)':'rgba(100,60,200,0.03)';ctx.fill();
  // Zodiac ring segments
  for(var i=0;i<12;i++){
    var a0=(-90+i*30)*Math.PI/180,a1=(-90+(i+1)*30)*Math.PI/180;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R+10,a0,a1);ctx.closePath();
    ctx.fillStyle=i%2===0?(isDark?'rgba(255,255,255,0.03)':'rgba(100,60,200,0.04)'):'transparent';ctx.fill();
    ctx.beginPath();ctx.arc(cx,cy,R+10,a0,a1);ctx.strokeStyle=isDark?'rgba(255,255,255,0.08)':'rgba(100,60,200,0.1)';ctx.lineWidth=1;ctx.stroke();
    // Sign label
    var la=(-90+i*30+15)*Math.PI/180,lr=R+22;
    ctx.fillStyle=isDark?'rgba(255,255,255,0.7)':'rgba(50,20,80,0.7)';ctx.font='bold 13px '+getComputedStyle(document.body).fontFamily;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(ZODIAC[i].e,cx+Math.cos(la)*lr,cy+Math.sin(la)*lr);
  }
  // Inner circles
  for(var r=R*0.66;r>=R*0.2;r-=R*0.23){
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle=isDark?'rgba(255,255,255,0.05)':'rgba(100,60,200,0.06)';ctx.lineWidth=0.5;ctx.stroke();
  }
  // Aspect lines
  var keys=Object.keys(planets);
  for(var ai=0;ai<aspects.length;ai++){
    var ap=aspects[ai],i1=keys.indexOf(ap.p1),i2=keys.indexOf(ap.p2);
    if(i1<0||i2<0)continue;
    var ang1=(planets[ap.p1]/360)*Math.PI*2-Math.PI/2,ang2=(planets[ap.p2]/360)*Math.PI*2-Math.PI/2;
    var r1=R*(0.66-(i1*0.045)),r2=R*(0.66-(i2*0.045));
    ctx.beginPath();ctx.moveTo(cx+Math.cos(ang1)*r1,cy+Math.sin(ang1)*r1);ctx.lineTo(cx+Math.cos(ang2)*r2,cy+Math.sin(ang2)*r2);
    var ac=ASPECT_COLORS[ap.aspect.en.toLowerCase()]||'#888';
    ctx.strokeStyle=ac;ctx.lineWidth=0.8;ctx.globalAlpha=0.4;ctx.stroke();ctx.globalAlpha=1;
  }
  // Planet dots
  for(var pi=0;pi<keys.length;pi++){
    var lon=planets[keys[pi]],ang=(lon/360)*Math.PI*2-Math.PI/2,r=R*(0.66-(pi*0.045));
    var px=cx+Math.cos(ang)*r,py=cy+Math.sin(ang)*r;
    var color=PLANET_COLORS[keys[pi]]||'#fff';
    // Glow
    ctx.beginPath();ctx.arc(px,py,5,0,Math.PI*2);ctx.fillStyle=color;ctx.globalAlpha=0.25;ctx.fill();ctx.globalAlpha=1;
    // Dot
    ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
    // Label
    ctx.fillStyle=color;ctx.font='bold 9px '+getComputedStyle(document.body).fontFamily;ctx.textAlign='left';
    var labelX=px+7,labelY=py-3;if(px>cx+100)labelX=px-40;
    var pnm={Sun:'☉',Moon:'☽',Mercury:'☿',Venus:'♀',Mars:'♂',Jupiter:'♃',Saturn:'♄',Uranus:'⛢',Neptune:'♆',Pluto:'♇'};
    ctx.fillText(pnm[keys[pi]]||keys[pi],labelX,labelY);
  }
  // Center text
  ctx.fillStyle=isDark?'rgba(255,255,255,0.3)':'rgba(50,20,80,0.3)';ctx.font='10px '+getComputedStyle(document.body).fontFamily;ctx.textAlign='center';
  ctx.fillText(mt('chartTitle'),cx,cy);

  // Legend
  var leg='';for(var li=0;li<keys.length;li++){leg+='<span style="color:'+PLANET_COLORS[keys[li]]+'"><i class="fa-solid fa-circle"></i> '+keys[li]+'</span>';}
  $('#chartLegend').innerHTML=leg;
}
