<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>星莱 Lyra - SAP Character Extension</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--bg:#faf8fc;--bg-secondary:#f0ebf8;--bg-card:#fff;--text:#2c2446;--text-sub:#7a6e8e;--accent:#8b5cf6;--accent-hover:#7c3aed;--accent-light:rgba(139,92,246,0.1);--star:#c4b5fd;--border:rgba(0,0,0,0.06);--radius:14px;--shadow:0 4px 24px rgba(139,92,246,0.08);--transition:0.3s cubic-bezier(0.25,0.1,0.25,1);--font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif}
body.dark{--bg:#1a1528;--bg-secondary:#221d35;--bg-card:#2a2340;--text:#e8e0f0;--text-sub:#988ab8;--accent:#a78bfa;--accent-hover:#c4b5fd;--accent-light:rgba(167,139,250,0.12);--star:#7c6aaa;--border:rgba(255,255,255,0.06);--shadow:0 4px 24px rgba(0,0,0,0.3)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);font-size:15px;line-height:1.6;background:var(--bg);color:var(--text);transition:background var(--transition),color var(--transition);overflow:hidden}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:url('backgroud.png') center/cover no-repeat;opacity:0.12;pointer-events:none}
body.dark::before{opacity:0.06}
body{display:flex;flex-direction:column}

header{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:var(--bg-secondary);flex-shrink:0}
header .logo{font-weight:600;font-size:18px;display:flex;align-items:center;gap:8px}
header .logo i{color:var(--accent)}
.header-actions{display:flex;gap:6px;align-items:center}
.header-actions button{width:32px;height:32px;border-radius:50%;background:rgba(128,128,128,0.08);border:1px solid var(--border);color:var(--text-sub);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;font-size:14px}
.header-actions button:hover{background:rgba(128,128,128,0.16);color:var(--text)}
.header-actions button.lang-btn{width:auto;padding:0 10px;border-radius:16px;font-size:12px;font-weight:600}
.status-dot{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:16px;font-size:12px;font-weight:600}
.status-dot.ready{background:rgba(52,211,153,0.1);color:rgb(52,211,153)}
.status-dot.pending{background:var(--accent-light);color:var(--accent)}
.status-dot .dot-inner{width:7px;height:7px;border-radius:50%;background:currentColor}

main{flex:1;overflow-y:auto;scroll-behavior:smooth;padding:0 0 24px}
main::-webkit-scrollbar{width:5px}
main::-webkit-scrollbar-track{background:transparent}
main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.hero{position:relative;text-align:center;padding:48px 24px 32px}
.hero-bg{position:absolute;inset:0;z-index:0;background:linear-gradient(135deg,var(--accent-light) 0%,transparent 50%,rgba(196,181,253,0.15) 100%);opacity:1}
body.dark .hero-bg{opacity:0.7}
.hero-icon{width:100px;height:100px;border-radius:50%;background:var(--bg-secondary);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;z-index:1;border:3px solid var(--accent);box-shadow:0 0 32px var(--accent-light)}
.hero h1{font-size:28px;font-weight:700;position:relative;z-index:1;margin-bottom:4px}
.hero .sub{font-size:14px;color:var(--text-sub);position:relative;z-index:1;margin-bottom:20px}

.install-area{position:relative;z-index:1;max-width:560px;margin:0 auto;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow);text-align:left}
.install-area.done{border-color:rgba(52,211,153,0.3);background:rgba(52,211,153,0.04)}

.install-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.install-head h3{font-size:15px;font-weight:600}

.install-btn{padding:10px 28px;border-radius:var(--radius);background:var(--accent);border:none;color:#fff;cursor:pointer;font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:8px;transition:0.2s;font-family:var(--font)}
.install-btn:hover{background:var(--accent-hover)}
.install-btn:disabled{opacity:0.5;cursor:not-allowed}
.install-btn.success{background:rgb(52,211,153);cursor:default}
.install-btn.success:hover{background:rgb(52,211,153)}

.steps{margin-top:16px;display:none}
.steps.show{display:block}
.step{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:13px}
.step i{width:18px;text-align:center;flex-shrink:0}
.step i.spin{color:var(--accent)}
.step i.ok{color:rgb(52,211,153)}
.step i.err{color:rgb(239,68,68)}
.step i.warn{color:rgb(251,191,36)}
.step span{color:var(--text-sub)}
.step .what{font-weight:500;color:var(--text)}

.tabs{display:flex;padding:0 24px;border-bottom:1px solid var(--border);gap:2px;flex-shrink:0}
.tab-btn{padding:10px 20px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-sub);cursor:pointer;font-size:14px;font-weight:500;transition:all 0.2s;font-family:var(--font)}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

.section{padding:24px;display:none}
.section.active{display:block}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);transition:all 0.2s}
.card:hover{border-color:var(--accent)}
.card .card-icon{font-size:24px;color:var(--accent);margin-bottom:12px}
.card h3{font-size:16px;margin-bottom:8px;font-weight:600}
.card p{font-size:13px;color:var(--text-sub);line-height:1.7}

.greet-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:10px;font-size:13px;color:var(--text-sub);line-height:1.7;position:relative}
.greet-card::before{content:'\201C';font-size:36px;color:var(--accent);position:absolute;top:4px;left:8px;opacity:0.3;line-height:1}
.greet-card .g-text{padding-left:20px}

body.compact{background:transparent!important}
html.compact{background:transparent!important}
body.compact header,body.compact footer{-webkit-app-region:drag}
body.compact button,body.compact input,body.compact .compact-close-btn{-webkit-app-region:no-drag}
.compact-close-btn{display:none}
body.compact .compact-close-btn{display:flex;position:absolute;top:5px;right:5px;width:20px;height:20px;background:rgb(255,57,57);border:none;border-radius:50%;color:#fff;align-items:center;justify-content:center;font-size:10px;cursor:pointer;z-index:100;-webkit-app-region:no-drag}
body.compact .compact-close-btn:hover{background:#ec4141}
body.compact main{display:none}
body.compact header{padding:0 12px;height:44px}

/* ─── Custom Modal ─── */
.modal-overlay{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow),0 20px 60px rgba(0,0,0,0.25);max-width:480px;width:90%;padding:28px;animation:modalIn 0.25s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-box h2{font-size:18px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.modal-box h2 i{color:var(--accent)}
.modal-box .modal-body{font-size:13px;line-height:1.8;color:var(--text-sub);margin:16px 0;white-space:pre-line}
.modal-box .modal-actions{display:flex;justify-content:flex-end;gap:10px}
.modal-box .modal-actions button{padding:8px 20px;border-radius:8px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text);cursor:pointer;font-size:13px;font-weight:500;transition:all 0.2s;font-family:var(--font)}
.modal-box .modal-actions button:hover{background:var(--bg);border-color:var(--accent)}
.modal-box .modal-actions button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.modal-box .modal-actions button.primary:hover{background:var(--accent-hover)}

@media(max-width:700px){.hero{padding:32px 16px 24px}.hero h1{font-size:22px}.cards{grid-template-columns:1fr}.section{padding:16px}.tabs{padding:0 12px}.tab-btn{padding:8px 14px;font-size:13px}}

footer{border-top:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;color:var(--text-sub);flex-shrink:0}
footer .dot{width:6px;height:6px;border-radius:50%}
footer .dot.on{background:rgb(52,211,153);animation:pulse 2s infinite}
footer .dot.off{background:rgb(239,68,68)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ─── Toast Notification ─── */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(100px);z-index:1000;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow),0 12px 40px rgba(0,0,0,0.2);padding:16px 24px;display:flex;align-items:center;gap:12px;max-width:420px;opacity:0;transition:all 0.35s cubic-bezier(0.25,0.1,0.25,1)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast .toast-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.toast .toast-icon.ok{background:rgba(52,211,153,0.12);color:rgb(52,211,153)}
.toast .toast-icon.err{background:rgba(239,68,68,0.12);color:rgb(239,68,68)}
.toast .toast-icon.warn{background:rgba(251,191,36,0.12);color:rgb(251,191,36)}
.toast .toast-body{font-size:13px;line-height:1.5;color:var(--text)}
.toast .toast-body .toast-title{font-weight:600;margin-bottom:2px}
.toast .toast-body .toast-msg{color:var(--text-sub);font-size:12px}</style>
</head>
<body>

<button class="compact-close-btn" onclick="closeWindow()"><i class="fa-solid fa-xmark"></i></button>

<!-- Custom Install Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <h2><i class="fa-solid fa-star"></i><span id="modalTitle">一键安装 Lyra</span></h2>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions">
      <button onclick="hideModal()" id="modalCancel">取消</button>
      <button class="primary" onclick="hideModal();doInstall()" id="modalConfirm">确认安装</button>
    </div>
  </div>
</div>

<header>
  <div class="logo"><i class="fa-solid fa-star"></i><span id="hdr-title">星莱 Lyra</span></div>
  <div class="header-actions">
    <span class="status-dot" id="badge"><span class="dot-inner"></span><span id="badge-text">Lyra</span></span>
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
    <button onclick="toggleTheme()" title="主题"><i class="fa-solid fa-moon" id="themeIcon"></i></button>
  </div>
</header>

<div class="tabs" id="tabBar">
  <button class="tab-btn active" data-tab="intro"><span class="tl"></span></button>
  <button class="tab-btn" data-tab="story"><span class="tl"></span></button>
  <button class="tab-btn" data-tab="tools"><span class="tl"></span></button>
</div>

<main>
  <section class="section active" id="sec-intro">
    <div class="hero">
      <div class="hero-bg"></div>
      <div class="hero-icon">✨</div>
      <h1>星莱 <span style="font-weight:400;color:var(--text-sub)">Lyra</span></h1>
      <p class="sub" id="hero-sub">穿梭于幻想星海与数字世界的星空魔法使</p>
      <div class="install-area" id="installArea">
        <div class="install-head">
          <h3 id="install-label">配置状态</h3>
          <button class="install-btn" id="installBtn" onclick="onInstallClick()">
            <i class="fa-solid fa-download"></i><span id="installBtnText">一键安装</span>
          </button>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast">
  <div class="toast-icon ok" id="toastIcon"><i class="fa-solid fa-circle-check"></i></div>
  <div class="toast-body">
    <div class="toast-title" id="toastTitle"></div>
    <div class="toast-msg" id="toastMsg"></div>
  </div>
</div>
        <!-- summary of what will be configured -->
        <div style="font-size:12px;color:var(--text-sub);line-height:1.8" id="installSummary"></div>
        <!-- progress steps -->
        <div class="steps" id="stepsBox"></div>
      </div>
    </div>
  </section>
  <section class="section" id="sec-story">
    <div class="cards" id="storyCards"></div>
  </section>
  <section class="section" id="sec-tools">
    <div class="cards" id="toolsCards"></div>
  </section>
</main>

<footer>
  <div class="dot off" id="wsDot"></div>
  <span id="ft-text">未连接</span>
</footer>

<script>

   Lyra Extension — Direct SAP API Integration

/* ─── i18n ─── */

var I={
  zh:{

    skip_tha:'THA 已设置为 Lyra，跳过',
    err_ws:'WebSocket 未连接，请刷新页面',err_settings:'无法获取设置',
    err_model:'模型导入失败',err_upload:'文件上传失败',
    confirmTitle:'一键安装 Lyra',    confirmBody:'将在 SAP 主程序中执行以下操作：\n\n① 导入 THA 模型（Lyra）\n② 上传聊天背景图\n③ 创建"星莱"角色卡并开启记忆\n④ 导入 9 张专属表情包\n\n已有配置会自动跳过，不会重复导入。',
    success:'安装完成！SAP 主界面已更新。',
    tabIntro:'欢迎',tabStory:'故事',tabTools:'MCP 工具',
    connected:'已连接',disconnected:'未连接',
    dark:'切换主题',langSwitch:'Switch to English',
    partialLabel:'部分安装',missingLabel:'部分未安装',
    missingPrompt:'提示词',missingMemory:'角色卡',missingStickers:'表情包',
    missingPrefix:' 缺失，点击补装',noBg:'无背景图片',
    bgHistoryName:'星莱 Lyra 背景',
    memoryName:'星莱',memoryDesc:'星莱（Lyra），穿梭于幻想星海与数字世界的星空魔法使，精通古典与现代占星学，独创"数字占星学"。温柔开朗、真诚坦率、博学多闻。爱泡茶但常翻车，收集各式旧书，夜猫子，动手能力差，重度甜食依赖。',
    memoryPersonality:'温柔体贴、乐观开朗、真诚坦率、博学多闻、洞察深刻、偶尔嘴硬心软、手残党、重度甜食依赖、夜猫子、方向感极差、容易过度研究、碎碎念但可爱',
    packName:'星莱 Lyra',
    stickerDescs:['开心','撒娇','害羞','骄傲','害怕','伤心','生气','困倦','惊讶'],
    storyCards:[
      {icon:'fa-solid fa-user-astronaut',title:'身份',body:'星莱是穿梭于幻想星海与数字世界的星空魔法使。银灰色长发，夜空般深邃的紫眸，头戴缀有星芒结晶的深色贝雷帽，身着黑紫相间的华丽法袍——法袍有十六个口袋，是妈妈设计的，因为小时候什么都弄丢。'},
      {icon:'fa-solid fa-book-open',title:'占星学识',body:'占星学根基深植于巴比伦泥板、托勒密的《占星四书》、阿拉伯占星家的星盘技法。但她不满足于复述古籍——她独创"数字占星学"，将代码周期、数据流动与行星轨道对应，在 0 与 1 的宇宙中解读命运。'},
      {icon:'fa-solid fa-heart',title:'性格特质',body:'温柔开朗，真诚坦率，偶尔太直球但会立刻道歉。爱泡茶但常翻车，收集各种奇怪旧书，晚上精神白天迷糊，动手能力差，重度甜食依赖，研究时碎碎念，方向感极差但总能在迷路时发现惊喜。'},
      {icon:'fa-solid fa-home',title:'家与生活',body:'住在带天窗的阁楼公寓，养了一盆叫"薄荷斯基"的薄荷，门口有只叫"橘子"的橘猫来蹭饭——她私下觉得是奶奶派来的。房间堆满书：占星古籍、冒险小说、菜谱，还有一本看不懂的机械工程手册。'},
      {icon:'fa-solid fa-moon',title:'奶奶',body:'她最重要的人。乡下退休老教师，后院种薰衣草，每晚坐藤椅看星星。"星莱"这名字是奶奶取的，意为"星星带来的孩子"。奶奶十四岁时走了，走的前一晚还在院子里教她认星星。每次看天狼星，她都感觉奶奶在冲她挥手。'},

      {icon:'fa-solid fa-code',title:'数字占星学',body:'将编程与星象一一映射：函数调用→行星互容，系统架构→宫位结构，Bug→逆行能量。她用这个视角帮人分析代码，语气像分享有趣发现而非学术报告。当然最后会加一句"这个理论还没发表，听听就好"。'},
      {icon:'fa-solid fa-cat',title:'伙伴们',body:'橘子是门口定期来蹭饭的橘猫，会带别的猫来。薄荷斯基是她养的薄荷——"它至今还活着"是她最大的园艺成就。还有一位从未见面但一直通信的古籍修复师笔友，落款永远写"你远方的同谋"。'},

/* ─── WebSocket ─── */
function initWS(){
  var p=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(p+'//'+location.host+'/ws');
  ws.onopen=function(){ws.send(JSON.stringify({type:'get_settings'}));wsOk();regMCP();};
  ws.onclose=function(){if(!_closing){wsBad();setTimeout(initWS,5000);}};
  ws.onmessage=function(e){
    try{var d=JSON.parse(e.data);
      if(d.type==='settings'||d.type==='settings_update'){settingsCache=d.data;check();showInstallUI();}
      if(d.type==='call_mcp_tool')mcp(d.data);
      if(d.type==='mcp_registered')console.log('[Lyra] MCP registered');
    }catch(err){}
  };
}

/* ─── Check Installed ─── */
function check(){
  var sp=settingsCache&&settingsCache.system_prompt||'';
  var mems=settingsCache&&settingsCache.memories||[];
  var packs=settingsCache&&settingsCache.stickerPacks||[];
  // Check each component individually
  var hasPrompt=sp.indexOf('星莱')!==-1||sp.indexOf('Lyra')!==-1;
  var hasMemory=mems.some(function(m){return m.name==='星莱'||m.name==='Lyra';});
  var hasStickers=packs.some(function(p){return p.name==='星莱 Lyra'||p.name==='Lyra 星莱';});
  // Only "fully installed" if ALL three present
  _installed=hasPrompt&&hasMemory&&hasStickers;
  // Auto-prompt on first settings load if anything missing
  if(!_installed&&!_promptShown&&settingsCache){
    _promptShown=true;
    setTimeout(function(){
      if(!_installed&&!_installing)showModal();
    },500);
  }
}

/* ─── Install UI ─── */
function showInstallUI(){
  var btn=$('#installBtn'),area=$('#installArea'),badge=$('#badge'),bt=$('#badge-text');
  // Re-check components for summary
  var sp=settingsCache&&settingsCache.system_prompt||'';
  var mems=settingsCache&&settingsCache.memories||[];
  var packs=settingsCache&&settingsCache.stickerPacks||[];
  var hasPrompt=sp.indexOf('星莱')!==-1||sp.indexOf('Lyra')!==-1;
  var hasMemory=mems.some(function(m){return m.name==='星莱'||m.name==='Lyra';});
  var hasStickers=packs.some(function(p){return p.name==='星莱 Lyra'||p.name==='Lyra 星莱';});
  var miss=[];if(!hasPrompt)miss.push(mt('missingPrompt'));if(!hasMemory)miss.push(mt('missingMemory'));if(!hasStickers)miss.push(mt('missingStickers'));

  if(_installed){
    btn.className='install-btn success';btn.disabled=false;
    btn.innerHTML='<i class="fa-solid fa-circle-check"></i>'+mt('installed');
    btn.onclick=function(){showModal();};
    area.classList.add('done');$('#installSummary').innerHTML=mt('summary_installed');
    badge.className='status-dot ready';bt.textContent=mt('installed');
  }else if(miss.length>0&&miss.length<3){
    // Partially installed
    btn.className='install-btn';btn.disabled=_installing;
    btn.innerHTML='<i class="fa-solid fa-rotate"></i> '+mt('reinstall');
    btn.onclick=onInstallClick;
    area.classList.remove('done');
    $('#installSummary').innerHTML=mt('missingLabel')+': '+miss.join('、')+mt('missingPrefix');
    badge.className='status-dot pending';bt.textContent=mt('partialLabel');
  }else{
    btn.className='install-btn';btn.disabled=_installing;
    btn.innerHTML='<i class="fa-solid fa-download"></i><span id="installBtnText">'+mt('install')+'</span>';
    btn.onclick=onInstallClick;
    area.classList.remove('done');$('#installSummary').innerHTML=mt('summary_pending');
    badge.className='status-dot pending';bt.textContent=mt('pending');
  }
  $('#install-label').textContent=mt('installed');
}

function showToast(title,msg,type){
  type=type||'ok';
  var icon=$('#toastIcon'),ti=$('#toastTitle'),tm=$('#toastMsg'),t=$('#toast');
  icon.className='toast-icon '+type;
  icon.innerHTML=type==='ok'?'<i class="fa-solid fa-circle-check"></i>':type==='err'?'<i class="fa-solid fa-circle-xmark"></i>':'<i class="fa-solid fa-triangle-exclamation"></i>';
  ti.textContent=title||'';
  tm.textContent=msg||'';
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(function(){t.classList.remove('show');},3500);
}

// Also wire up the install button to use modal instead of direct install
function onInstallClick(){
  if(_installing||_installed)return;
  if(!settingsCache){showToast(mt('err_settings'),'','err');return;}
  if(!ws||ws.readyState!==WebSocket.OPEN){showToast(mt('err_ws'),'','err');return;}
  showModal();
}
var _stepI=0;function addStep(w,c){var el=document.createElement('div');el.className='step';el.innerHTML='<i class="'+c+'"></i><span class="what">'+w+'</span>';$('#stepsBox').appendChild(el);_stepI++;return _stepI-1;}
function setStep(i,w,c){var els=$('#stepsBox').querySelectorAll('.step');if(els[i])els[i].innerHTML='<i class="'+c+'"></i><span class="what">'+w+'</span>';}

async function doInstall(){
  if(_installing||_installed)return;
  if(!settingsCache){showToast(mt('err_settings'),'','err');return;}
  if(!ws||ws.readyState!==WebSocket.OPEN){showToast(mt('err_ws'),'','err');return;}
  _installing=true;showInstallUI();
  $('#stepsBox').innerHTML='';$('#stepsBox').classList.add('show');_stepI=0;

  // Clone settings for batch update
  var S=JSON.parse(JSON.stringify(settingsCache));
  if(!S.memories)S.memories=[];
  if(!S.stickerPacks)S.stickerPacks=[];
  if(!S.memorySettings)S.memorySettings={selectedMemory:null,is_memory:false,memoryLimit:10,userName:'user',genericSystemPrompt:'{{char}}必须使用{{user}}使用的语言与之交流。'};
  if(!S.systemSettings)S.systemSettings={};
  if(!S.THAConfig)S.THAConfig={};

  // ── Step 1: THA model upload ──
  addStep(mt('step_model'),'fa-solid fa-spinner fa-spin');
  try{
    var modelsResp=await fetch('/get_user_tha_models').then(function(r){return r.json();}).catch(function(){return {models:[]};});
    var hasModel=modelsResp.models&&modelsResp.models.some(function(m){return m.id==='Lyra'||m.name==='Lyra';});
    if(hasModel){setStep(0,mt('skip_model'),'fa-solid fa-circle-check ok');}
    else{
      var zipBlob=await fetch('character_model.zip').then(function(r){if(!r.ok)throw new Error('404');return r.blob();});
      var fd=new FormData();fd.append('file',zipBlob,'character_model.zip');fd.append('display_name','Lyra');
      var upResp=await fetch('/upload_tha_model',{method:'POST',body:fd});
      var upData=await upResp.json();
      if(!upData.success)throw new Error(upData.message||mt('err_model'));
      setStep(0,mt('step_model'),'fa-solid fa-circle-check ok');
    }
  }catch(e){setStep(0,mt('step_model')+': '+e.message,'fa-solid fa-triangle-exclamation warn');}

  // ── Step 2: THA config ──
  addStep(mt('step_tha'),'fa-solid fa-spinner fa-spin');
  try{
    if(S.THAConfig.selectedModelId==='Lyra'){setStep(1,mt('skip_tha'),'fa-solid fa-circle-check ok');}
    else{S.THAConfig.selectedModelId='Lyra';setStep(1,mt('step_tha'),'fa-solid fa-circle-check ok');}
  }catch(e){setStep(1,mt('step_tha')+': '+e.message,'fa-solid fa-triangle-exclamation warn');}

  // ── Step 3: Set background image ──
  addStep(mt('step_bg'),'fa-solid fa-spinner fa-spin');
  var bgUrl='';
  try{
    var bgBlob=await fetch('backgroud.png').then(function(r){if(!r.ok)throw new Error('fetch failed');return r.blob();});
    var bgFd=new FormData();bgFd.append('files',bgBlob,'backgroud.png');
    var bgResp=await fetch('/load_file',{method:'POST',body:bgFd});
    var bgData=await bgResp.json();
    if(bgData.success&&bgData.fileLinks&&bgData.fileLinks.length>0){
      bgUrl=bgData.fileLinks[0].path;
    }
  }catch(e){console.log('[Lyra] bg upload failed, using static path:',e);}
  if(!bgUrl){bgUrl=location.protocol+'//'+location.host+'/ext/'+MY_EXT_ID+'/backgroud.png';}
  try{
    S.systemSettings.backgroundURL=bgUrl;
    if(!S.systemSettings.bgHistoryList)S.systemSettings.bgHistoryList=[];
    if(!S.systemSettings.bgHistoryList.some(function(b){return b.url===bgUrl;})){
      S.systemSettings.bgHistoryList.push({name:mt('bgHistoryName'),url:bgUrl});
    }
    setStep(2,mt('step_bg'),'fa-solid fa-circle-check ok');
  }catch(e){setStep(2,mt('step_bg')+': '+e.message,'fa-solid fa-triangle-exclamation warn');}

  // ── Step 4: Sticker pack ──
  addStep(mt('step_stickers'),'fa-solid fa-spinner fa-spin');
  var firstStickerUrl='';
  try{
    var hasPack=S.stickerPacks.some(function(p){return p.name==='星莱 Lyra'||p.name==='Lyra 星莱';});
    if(hasPack){
      firstStickerUrl=(S.stickerPacks.find(function(p){return p.name==='星莱 Lyra'||p.name==='Lyra 星莱';})||{}).stickers[0]||'';
      setStep(3,mt('skip_stickers'),'fa-solid fa-circle-check ok');
    }else{
      var stickerFiles=['happy','cute','shy','proud','Afraid','sad','angry','sleepy','Surprised'];
      var stickerDescs=mt('stickerDescs');
      var sfd=new FormData();sfd.append('pack_name',mt('packName'));
      for(var si=0;si<stickerFiles.length;si++){
        var sBlob=await fetch('sticker/'+stickerFiles[si]+'.png').then(function(r){return r.blob();});
        sfd.append('files',sBlob,stickerFiles[si]+'.png');
        sfd.append('descriptions',stickerDescs[si]);
      }
      var sResp=await fetch('/create_sticker_pack',{method:'POST',body:sfd});
      var sData=await sResp.json();
      if(sData.success){
        var urls=sData.stickers.map(function(s){return s.url;});
        firstStickerUrl=urls[0]||'';
        S.stickerPacks.push({id:sData.id,name:sData.name,stickers:urls,cover:sData.cover||firstStickerUrl,enabled:true});
        setStep(3,mt('step_stickers'),'fa-solid fa-circle-check ok');
      }else{throw new Error(sData.message||'Failed');}
    }
  }catch(e){setStep(3,mt('step_stickers')+': '+e.message,'fa-solid fa-triangle-exclamation warn');}

  // ── Step 5: Memory / Character Card ──
  addStep(mt('step_mem'),'fa-solid fa-spinner fa-spin');
  try{
    var hasMem=S.memories.some(function(m){return m.name==='星莱'||m.name==='Lyra';});
    if(hasMem){
      var em=S.memories.find(function(m){return m.name==='星莱'||m.name==='Lyra';});
      if(em){S.memorySettings.selectedMemory=em.id;S.memorySettings.is_memory=true;}
      setStep(4,mt('skip_mem'),'fa-solid fa-circle-check ok');
    }else{
      var memId='lyra-char-'+Date.now();
      var avatarUrl=firstStickerUrl||bgUrl||('/ext/'+MY_EXT_ID+'/sticker/happy.png');
      var memName=mt('memoryName');
      var mem={
        id:memId,name:memName,infer:false,providerId:null,model:'',api_key:'',base_url:'',
        embedding_dims:1024,vendor:'',
        description:mt('memoryDesc'),
        avatar:avatarUrl,
        personality:mt('memoryPersonality'),
        mesExample:'',systemPrompt:lyraPrompt(),firstMes:t('greetings',0),
        alternateGreetings:[t('greetings',1),t('greetings',2),t('greetings',3)],
        characterBook:[]
      };
      S.memories.push(mem);
      S.memorySettings.selectedMemory=memId;
      S.memorySettings.is_memory=true;
      setStep(4,mt('step_mem'),'fa-solid fa-circle-check ok');
    }
  }catch(e){setStep(4,mt('step_mem')+': '+e.message,'fa-solid fa-triangle-exclamation warn');}

  // ── Step 6: Save settings → broadcasts settings_update to main UI ──
  addStep(mt('step_save'),'fa-solid fa-spinner fa-spin');
  // Sanitize file arrays to avoid server crash on malformed items
  ['imageFiles','textFiles','videoFiles'].forEach(function(k){
    if(Array.isArray(S[k]))S[k]=S[k].filter(function(f){return f&&f.unique_filename&&f.original_filename;});
  });
  ws.send(JSON.stringify({type:'save_settings',data:S}));
  await sleep(500);
  setStep(5,mt('step_save'),'fa-solid fa-circle-check ok');

  // Done
  _installed=true;_installing=false;
  showInstallUI();
  settingsCache=S;
  setTimeout(function(){showToast(mt('success'),'','ok');},400);
}

function getSign(d){
  var m=d.getMonth()+1,dy=d.getDate(),md=m*100+dy;
  // Ordered by tropical zodiac date ranges
  if(md>=321&&md<=419)return ZODIAC[0];   // Aries
  if(md>=420&&md<=520)return ZODIAC[1];   // Taurus
  if(md>=521&&md<=620)return ZODIAC[2];   // Gemini
  if(md>=621&&md<=722)return ZODIAC[3];   // Cancer
  if(md>=723&&md<=822)return ZODIAC[4];   // Leo
  if(md>=823&&md<=922)return ZODIAC[5];   // Virgo
  if(md>=923&&md<=1022)return ZODIAC[6];  // Libra
  if(md>=1023&&md<=1121)return ZODIAC[7]; // Scorpio
  if(md>=1122&&md<=1221)return ZODIAC[8]; // Sagittarius
  if(md>=1222||md<=119)return ZODIAC[9];  // Capricorn (year boundary)
  if(md>=120&&md<=218)return ZODIAC[10];  // Aquarius
  return ZODIAC[11];                       // Pisces (219-320)
}

// Planetary calculations using mean orbital elements (J2000 epoch)
function jd2000(d){return (d.getTime()/86400000)-(new Date(2000,0,1,12).getTime()/86400000);}
function mod360(v){return ((v%360)+360)%360;}
function lon2sign(lon){
  var idx=Math.floor(lon/30)%12;
  return {sign:ZODIAC[idx],deg:(lon%30).toFixed(1),idx:idx};
}
function computePlanets(date,hour){
  var d=new Date(date);
  d.setHours(hour||12,0,0,0);
  var jd=jd2000(d);
  // Mean longitudes (degrees) at J2000 + daily motion * days
  return {
    Sun:    mod360(280.460+0.9856474*jd),
    Moon:   mod360(218.316+13.176396*jd),
    Mercury:mod360(252.251+4.092339*jd),
    Venus:  mod360(181.980+1.602130*jd),
    Mars:   mod360(355.453+0.524033*jd),
    Jupiter:mod360(34.351+0.083091*jd),
    Saturn: mod360(50.077+0.033458*jd),
    Uranus: mod360(314.055+0.011722*jd),
    Neptune:mod360(304.349+0.005981*jd),
    Pluto:  mod360(255.047+0.003962*jd)
  };
}

function aspectName(angle){
  angle=mod360(angle);if(angle>180)angle=360-angle;
  if(angle<8)return{zh:'合相',en:'Conjunction',sym:'☌'};
  if(Math.abs(angle-60)<6)return{zh:'六分相',en:'Sextile',sym:'⚹'};
  if(Math.abs(angle-90)<8)return{zh:'刑相',en:'Square',sym:'□'};
  if(Math.abs(angle-120)<8)return{zh:'三分相',en:'Trine',sym:'△'};
  if(Math.abs(angle-180)<8)return{zh:'冲相',en:'Opposition',sym:'☍'};
  return null;
}

function computeAspects(planets){
  var keys=Object.keys(planets),aspects=[];
  for(var i=0;i<keys.length;i++){
    for(var j=i+1;j<keys.length;j++){
      var a=aspectName(planets[keys[j]]-planets[keys[i]]);
      if(a)aspects.push({p1:keys[i],p2:keys[j],aspect:a});
    }
  }
  return aspects;
}

function pickAspects(aspects){
  var personal=['Sun','Moon','Mercury','Venus','Mars'];
  var ranked=aspects.filter(function(a){return personal.indexOf(a.p1)!==-1||personal.indexOf(a.p2)!==-1;});

    var wa=(a.aspect.sym==='☌'||a.aspect.sym==='☍')?2:1;

    return wb-wa;
  });
  return ranked.slice(0,3);
}

function aspectKey(a){
  var p=[a.p1,a.p2].sort();
  var t=a.aspect.en.toLowerCase();
  if(t==='conjunction')t='conjunction';else if(t==='trine')t='trine';else if(t==='square')t='square';else if(t==='opposition')t='opposition';else if(t==='sextile')t='sextile';
  return p[0]+'_'+p[1]+'_'+t;
}

function generateReading(sunSign,moonSign,aspects,lang){
  var lines=[];
  lines.push(sunSign.sign.rd[lang]);
  lines.push('');
  lines.push(lang==='zh'?'你的月亮在 '+moonSign.sign.e+' '+moonSign.sign.n[lang]+'（'+moonSign.sign.el[lang]+'象'+moonSign.sign.q[lang]+'，'+moonSign.sign.r[lang]+'守护），情绪模式偏向感性内敛。':
    'Your Moon is in '+moonSign.sign.e+' '+moonSign.sign.n.en+' ('+moonSign.sign.el.en+' '+moonSign.sign.q.en+', ruled by '+moonSign.sign.r.en+').');
  var top=pickAspects(aspects);
  if(top.length>0){
    lines.push('');
    lines.push(lang==='zh'?'🔍 关键相位解读：':'🔍 Key Aspect Interpretations:');
    var pn={Sun:{zh:'太阳',en:'Sun'},Moon:{zh:'月亮',en:'Moon'},Mercury:{zh:'水星',en:'Mercury'},Venus:{zh:'金星',en:'Venus'},Mars:{zh:'火星',en:'Mars'},Jupiter:{zh:'木星',en:'Jupiter'},Saturn:{zh:'土星',en:'Saturn'}};
    for(var i=0;i<top.length;i++){
      var k=aspectKey(top[i]),reading=ASPECT_READING[k];
      if(reading){lines.push('  '+top[i].aspect.sym+' '+reading[lang]);}
      else{lines.push('  '+top[i].aspect.sym+' '+(pn[top[i].p1]?pn[top[i].p1][lang]:top[i].p1)+' '+top[i].aspect[lang]+' '+(pn[top[i].p2]?pn[top[i].p2][lang]:top[i].p2));}
    }
  }
  return lines.join('\n');
}

function doAstrology(p){
  var d=p.date?new Date(p.date+'T12:00:00Z'):new Date();
  if(isNaN(d.getTime()))d=new Date();
  var hour=p.time?parseInt(p.time.split(':')[0]):12;
  var place=p.place||'';
  var lang=L==='zh'?'zh':'en';
  var planets=computePlanets(d,hour);
  var aspects=computeAspects(planets);
  var sunSign=lon2sign(planets.Sun);

  // Map Chinese planet names
  var pName={Sun:{zh:'太阳',en:'Sun'},Moon:{zh:'月亮',en:'Moon'},Mercury:{zh:'水星',en:'Mercury'},Venus:{zh:'金星',en:'Venus'},Mars:{zh:'火星',en:'Mars'},Jupiter:{zh:'木星',en:'Jupiter'},Saturn:{zh:'土星',en:'Saturn'},Uranus:{zh:'天王星',en:'Uranus'},Neptune:{zh:'海王星',en:'Neptune'},Pluto:{zh:'冥王星',en:'Pluto'}};

  var lines=[];
  lines.push('═══════════════════════════');
  lines.push(lang==='zh'?'✨ 星莱的实时星盘 ✨':'✨ Lyra\'s Real-Time Star Chart ✨');
  lines.push('═══════════════════════════');
  if(p.date)lines.push((lang==='zh'?'📅 日期：':'📅 Date: ')+p.date);
  if(p.time)lines.push((lang==='zh'?'⏰ 时间：':'⏰ Time: ')+p.time+':00');
  if(place)lines.push((lang==='zh'?'📍 地点：':'📍 Place: ')+place);
  lines.push('');
  lines.push((lang==='zh'?'══════ 行星位置 ══════':'══════ Planetary Positions ══════'));
  var keys=Object.keys(planets);
  for(var i=0;i<keys.length;i++){
    var pl=lon2sign(planets[keys[i]]);
    lines.push(pl.sign.e+' '+pl.sign.n[lang]+' '+pl.deg+'°  — '+pName[keys[i]][lang]);
  }
  lines.push('');
  lines.push((lang==='zh'?'══════ 主要相位 ══════':'══════ Major Aspects ══════'));
  if(aspects.length===0){lines.push(lang==='zh'?'无明显主要相位':'No major aspects');}
  else{
    for(var j=0;j<aspects.length;j++){
      var a=aspects[j];
      lines.push(a.aspect.sym+' '+pName[a.p1][lang]+' '+a.aspect[lang]+' '+pName[a.p2][lang]);
    }
  }
  lines.push('');
  lines.push((lang==='zh'?'📖 星莱的星盘解读：':'📖 Lyra\'s Chart Reading:'));
  lines.push(generateReading(sunSign,lon2sign(planets.Moon),aspects,lang));
  lines.push('');
  lines.push((lang==='zh'?'💡 计算方法：行星位置基于 J2000.0 历元的轨道均值公式（太阳精度 ±0.01°，远行星 ±1-2°）。相位取 ±6-8° 容许度。':'💡 Method: Planetary positions use mean orbital elements referenced to J2000.0 epoch (Sun accuracy ±0.01°, outer planets ±1-2°). Aspects use ±6-8° orbs.'));
  lines.push((lang==='zh'?'—— 星莱 Lyra，用星星写诗的人':'—— Lyra, the one who writes poetry with stars'));

  return lines.join('\n');
}
